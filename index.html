<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Famous Seller</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    padding-bottom:90px;
}

/* TOP BAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:#111827;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.logo{
    font-size:35px;
}

.avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    border:2px solid lime;
}

/* SEARCH */

.search-box{
    padding:15px;
}

.search-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
    font-size:16px;
    outline:none;
}

/* BALANCE CARD */

.balance-card{
    margin:15px;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    padding:20px;
    border-radius:25px;
    box-shadow:0 0 20px rgba(0,255,100,0.3);
}

.balance-card h1{
    font-size:40px;
    margin:10px 0;
}

.btns{
    margin-top:15px;
}

.deposit,.withdraw{
    padding:12px 20px;
    border:none;
    border-radius:12px;
    margin-right:10px;
    font-weight:bold;
    cursor:pointer;
}

.deposit{
    background:white;
    color:black;
}

.withdraw{
    background:black;
    color:white;
}

/* TITLES */

.section-title{
    padding:0 20px;
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

/* MARKET CARD */

.market-card{
    background:#1e293b;
    margin:15px;
    padding:20px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.price{
    font-size:28px;
    font-weight:bold;
}

.green{
    color:lime;
}

.red{
    color:red;
}

/* BUY SELL BUTTONS */

.trade-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}

.buy,.sell{
    padding:15px 40px;
    border:none;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.buy{
    background:limegreen;
    color:white;
}

.sell{
    background:crimson;
    color:white;
}

.buy:hover,.sell:hover{
    transform:scale(1.05);
}

/* COINS */

.coins{
    padding:15px;
}

.coin{
    background:#1e293b;
    margin-bottom:15px;
    padding:18px;
    border-radius:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* HISTORY */

.history-card{
    margin:15px;
    background:#1e293b;
    padding:20px;
    border-radius:20px;
}

.trade{
    background:#334155;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

/* ONLINE USERS */

.online{
    margin:15px;
    background:#1e293b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    color:lime;
    font-weight:bold;
}

/* BOTTOM NAV */

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111827;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #334155;
}

.nav-item{
    text-align:center;
    font-size:20px;
    color:gray;
}

.nav-item p{
    margin:5px 0 0;
    font-size:12px;
}

.active{
    color:lime;
}

/* LOADER */

#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
    font-size:30px;
    font-weight:bold;
    color:lime;
}

</style>
</head>

<body>

<!-- LOADING SCREEN -->

<div id="loader">
FAMOUS SELLER 💹
</div>

<!-- TOP BAR -->

<div class="topbar">

    <div class="logo">💹</div>

    <div>
        <h2>Famous Seller</h2>
        <small>Trade Crypto Easily</small>
    </div>

    <img src="https://i.pravatar.cc/100" class="avatar">

</div>

<!-- SEARCH -->

<div class="search-box">
    <input type="text" placeholder="Search coin...">
</div>

<!-- BALANCE CARD -->

<div class="balance-card">

    <h3>Total Balance</h3>

    <h1>$<span id="balance">1000</span></h1>

    <div class="btns">
        <button class="deposit">Deposit</button>
        <button class="withdraw">Withdraw</button>
    </div>

</div>

<!-- ONLINE USERS -->

<div class="online">
👥 12,532 Traders Online
</div>

<!-- MARKET TITLE -->

<div class="section-title">
Trending Markets 🔥
</div>

<!-- BTC CARD -->

<div class="market-card">

    <div>
        <h2>₿ Bitcoin</h2>
        <small>BTC/USD</small>
    </div>

    <div class="price green" id="price">
        $50000
    </div>

</div>

<!-- BUY SELL -->

<div class="trade-buttons">

    <button class="buy" onclick="buyTrade()">
        BUY
    </button>

    <button class="sell" onclick="sellTrade()">
        SELL
    </button>

</div>

<!-- COINS -->

<div class="coins">

    <div class="coin">
        <div>💎 Ethereum</div>
        <span>$3000</span>
    </div>

    <div class="coin">
        <div>🚀 Solana</div>
        <span>$145</span>
    </div>

    <div class="coin">
        <div>🐶 Dogecoin</div>
        <span>$0.24</span>
    </div>

    <div class="coin">
        <div>🔥 XRP</div>
        <span>$1.12</span>
    </div>

</div>

<!-- HISTORY -->

<div class="history-card">

    <h2>Recent Trades</h2>

    <div id="history"></div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

    <div class="nav-item active">
        🏠
        <p>Home</p>
    </div>

    <div class="nav-item">
        📈
        <p>Markets</p>
    </div>

    <div class="nav-item">
        💰
        <p>Wallet</p>
    </div>

    <div class="nav-item">
        👤
        <p>Profile</p>
    </div>

</div>

<script>

/* BALANCE */

let balance = 1000;

/* BTC PRICE */

let price = 50000;

/* UPDATE PRICE */

function updatePrice(){

    let change = Math.floor(Math.random() * 1000 - 500);

    price += change;

    document.getElementById("price").innerHTML = "$" + price;

    if(change >= 0){

        document.getElementById("price").className = "price green";

    }else{

        document.getElementById("price").className = "price red";
    }
}

/* CHANGE PRICE EVERY 2 SECONDS */

setInterval(updatePrice,2000);

/* BUY */

function buyTrade(){

    balance -= 50;

    document.getElementById("balance").innerHTML = balance;

    addHistory("🟢 Bought BTC at $" + price);
}

/* SELL */

function sellTrade(){

    balance += 50;

    document.getElementById("balance").innerHTML = balance;

    addHistory("🔴 Sold BTC at $" + price);
}

/* HISTORY */

function addHistory(text){

    let div = document.createElement("div");

    div.className = "trade";

    div.innerHTML = text;

    document.getElementById("history").prepend(div);
}

/* LOADER */

setTimeout(()=>{

    document.getElementById("loader").style.display = "none";

},2500);

/* RANDOM NOTIFICATIONS */

setInterval(()=>{

    alert("📈 BTC Market Is Moving!");

},30000);

</script>

</body>
  </html>
